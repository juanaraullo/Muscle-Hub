<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a84ff">
<title>Fit Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='116' fill='%230a84ff'/%3E%3Cg fill='%23fff'%3E%3Crect x='88' y='216' width='34' height='80' rx='14'/%3E%3Crect x='130' y='184' width='34' height='144' rx='14'/%3E%3Crect x='172' y='243' width='168' height='26' rx='13'/%3E%3Crect x='348' y='184' width='34' height='144' rx='14'/%3E%3Crect x='390' y='216' width='34' height='80' rx='14'/%3E%3C/g%3E%3C/svg%3E">
<style>
/* ── iOS-inspired design tokens ─────────────────────────────────────── */
:root{
  --bg:#f2f2f7; --elev:#ffffff; --fg:#0a0a0c; --fg2:#6e6e73; --fg3:#aeaeb2;
  --sep:rgba(60,60,67,.12); --accent:#0a84ff; --accent-soft:rgba(10,132,255,.12);
  --success:#30d158; --success-soft:rgba(48,209,88,.14); --warning:#ff9f0a;
  --danger:#ff453a; --danger-soft:rgba(255,69,58,.12);
  --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
  --glass:rgba(255,255,255,.72); --grid:rgba(60,60,67,.1); --chip:rgba(10,10,12,.05);
}
html.dark{
  --bg:#000; --elev:#1c1c1e; --fg:#f5f5f7; --fg2:#98989f; --fg3:#636366;
  --sep:rgba(84,84,88,.5); --accent-soft:rgba(10,132,255,.18);
  --success-soft:rgba(48,209,88,.16); --danger-soft:rgba(255,69,58,.16);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  --glass:rgba(22,22,24,.72); --grid:rgba(84,84,88,.35); --chip:rgba(255,255,255,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-feature-settings:"tnum";overscroll-behavior-y:none;min-height:100dvh;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font:inherit;color:var(--fg)}
#app{max-width:640px;margin:0 auto;padding:0 16px 120px;padding-top:env(safe-area-inset-top)}
h1{font-size:32px;letter-spacing:-.02em;padding:28px 0 14px}
.sub{font-size:13px;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.04em}
.sec{font-size:13px;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.04em;margin:20px 4px 8px}
.card{background:var(--elev);border-radius:20px;box-shadow:var(--shadow);padding:16px}
.row{display:flex;align-items:center;gap:12px}
.grow{flex:1;min-width:0}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.muted{color:var(--fg2);font-size:13px}
.tiny{color:var(--fg3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;border-radius:16px;
  height:44px;padding:0 20px;font-size:15px;transition:transform .12s,filter .15s;user-select:none;-webkit-user-select:none}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn.primary{background:var(--accent);color:#fff}
.btn.soft{background:var(--accent-soft);color:var(--accent)}
.btn.plain{background:var(--elev);border:1px solid var(--sep);box-shadow:var(--shadow)}
.btn.danger{background:var(--danger-soft);color:var(--danger)}
.btn.green{background:var(--success);color:#fff}
.btn.lg{height:50px;font-size:17px;width:100%}
.btn.sm{height:32px;padding:0 14px;border-radius:99px;font-size:13px}
.icobtn{width:32px;height:32px;border-radius:99px;background:var(--chip);color:var(--fg2);
  display:flex;align-items:center;justify-content:center;flex:none;font-size:15px;transition:transform .12s}
.icobtn:active{transform:scale(.88)}
.chip{height:32px;padding:0 14px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap;flex:none;
  background:var(--elev);color:var(--fg2);border:1px solid var(--sep)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 12px;margin:0 -16px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.seg{display:flex;padding:4px;border-radius:12px;background:var(--chip)}
.seg button{flex:1;height:30px;border-radius:9px;font-size:13px;font-weight:600;color:var(--fg2)}
.seg button.on{background:var(--elev);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.input{height:44px;width:100%;border-radius:14px;background:var(--elev);border:1px solid var(--sep);
  padding:0 14px;font-size:15px;outline:none}
.input:focus{box-shadow:0 0 0 2.5px rgba(10,132,255,.5)}
.num{height:36px;width:52px;border-radius:10px;background:var(--elev);border:1px solid var(--sep);
  text-align:center;font-size:15px;font-weight:600;outline:none;-moz-appearance:textfield;appearance:textfield}
.num::-webkit-outer-spin-button,.num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.num:focus{box-shadow:0 0 0 2.5px rgba(10,132,255,.5)}
label.lbl{display:block;font-size:13px;font-weight:600;color:var(--fg2);margin:0 4px 6px}
/* tab bar */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--glass);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--sep)}
#tabbar .in{max-width:640px;margin:0 auto;display:flex;padding-bottom:env(safe-area-inset-bottom)}
#tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0 8px;
  color:var(--fg3);font-size:10px;font-weight:600}
#tabbar button.on{color:var(--accent)}
#tabbar svg{width:23px;height:23px}
/* sheet */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;
  justify-content:center;animation:fade .2s}
.sheet{background:var(--bg);width:100%;max-width:560px;border-radius:24px 24px 0 0;max-height:92dvh;
  display:flex;flex-direction:column;animation:up .28s cubic-bezier(.32,.72,.35,1)}
@media(min-width:600px){.overlay{align-items:center}.sheet{border-radius:24px;max-height:85dvh}}
.sheet .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;flex:none}
.sheet .hd h2{font-size:17px;text-align:center;flex:1}
.sheet .bd{overflow-y:auto;padding:4px 20px calc(28px + env(safe-area-inset-bottom))}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
/* toast */
#toast{position:fixed;bottom:96px;left:0;right:0;z-index:60;display:flex;justify-content:center;
  pointer-events:none;padding:0 16px}
#toast .in{pointer-events:auto;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--sep);border-radius:16px;padding:12px 20px;display:flex;gap:16px;align-items:center;
  box-shadow:var(--shadow);font-size:14px;font-weight:500;animation:up .25s}
#toast .act{color:var(--accent);font-weight:700;font-size:14px}
/* session set rows */
.setrow{display:flex;align-items:center;gap:6px;padding:6px 4px;border-radius:12px;background:var(--elev);margin-bottom:6px}
.setrow.done{background:var(--success-soft)}
.badge{width:28px;height:28px;border-radius:99px;background:var(--chip);color:var(--fg2);font-size:13px;
  font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.badge.w{background:rgba(255,159,10,.15);color:var(--warning)}
.badge.d{background:var(--accent-soft);color:var(--accent)}
.check{width:28px;height:28px;border-radius:99px;background:var(--chip);color:var(--fg3);flex:none;
  display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.check.on{background:var(--success);color:#fff}
.check:active{transform:scale(.85)}
.stpr{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
.stpr .icobtn{width:24px;height:24px;font-size:13px}
.cols{display:flex;align-items:center;gap:6px;padding:0 4px;margin-bottom:4px}
.cols span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg3);text-align:center}
/* rest bar */
#restbar{position:fixed;bottom:96px;left:16px;right:16px;z-index:45;display:flex;justify-content:center}
#restbar .in{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--sep);border-radius:18px;box-shadow:var(--shadow);padding:10px 16px;
  display:flex;align-items:center;gap:12px;width:100%;max-width:380px;position:relative;overflow:hidden;animation:up .25s}
#restbar .bar{position:absolute;left:0;bottom:0;height:2.5px;background:var(--accent);transition:width .3s linear}
#restbar .t{flex:1;text-align:center;font-size:24px;font-weight:700}
/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal .dh{font-size:11px;font-weight:700;color:var(--fg3);padding:4px 0}
.cal button{height:40px;border-radius:12px;font-size:14px;font-weight:500;position:relative}
.cal button.today{background:var(--accent-soft);color:var(--accent)}
.cal button.sel{background:var(--accent);color:#fff}
.cal .dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:6px;height:6px;
  border-radius:99px;background:var(--accent)}
.cal button.sel .dot{background:#fff}
/* settings rows */
.setline{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px;
  border-bottom:1px solid var(--sep)}
.setline:last-child{border-bottom:0}
/* switch */
.sw{width:51px;height:31px;border-radius:99px;background:var(--chip);padding:2px;transition:background .2s;flex:none}
.sw.on{background:var(--success)}
.sw i{display:block;width:27px;height:27px;border-radius:99px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);
  transition:transform .2s}
.sw.on i{transform:translateX(20px)}
/* splash / loading screen */
#splash{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;transition:opacity .45s;text-align:center;padding:0 36px}
#splash .logo{width:88px;height:88px;border-radius:28px;background:linear-gradient(135deg,#0a84ff,#0050c8);
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(10,132,255,.35);
  animation:pop .55s cubic-bezier(.32,.72,.35,1)}
#splash .logo svg{width:46px;height:46px;color:#fff}
#splash .hi{font-size:14px;font-weight:600;color:var(--fg2);animation:rise .5s .1s both}
#splash .line{font-size:21px;font-weight:800;line-height:1.35;max-width:320px;animation:rise .55s .2s both}
#splash .bar{width:120px;height:4px;border-radius:99px;background:var(--chip);overflow:hidden;animation:rise .5s .3s both}
#splash .bar i{display:block;height:100%;width:40%;border-radius:99px;background:var(--accent);animation:slide 1.1s ease-in-out infinite}
@keyframes pop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
.empty{text-align:center;padding:44px 24px;color:var(--fg2)}
.empty .ico{width:56px;height:56px;border-radius:18px;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
.empty p.t{font-size:17px;font-weight:600;color:var(--fg)}
.empty p.s{font-size:14px;margin-top:4px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center}
.big{font-size:24px;font-weight:700}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="tabbar"><div class="in" id="tabs"></div></div>
<div id="restbar" style="display:none"></div>
<div id="toast"></div>
<div id="sheetroot"></div>
<div id="splash"></div>

<script>
"use strict";
/* ═══════════════ Fit Tracker — single-file offline workout tracker ═══════════════
   Original implementation. All data stays in this browser (localStorage).       */

/* ── helpers ─────────────────────────────────────────────────────────── */
const $=s=>document.querySelector(s);
const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2,10);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const clock=t=>`${String(Math.floor(t/60)).padStart(2,"0")}:${String(Math.floor(t%60)).padStart(2,"0")}`;
const dur=t=>{const h=Math.floor(t/3600),m=Math.floor(t%3600/60);return h?`${h}h ${m}m`:m?`${m}m`:`${Math.floor(t)}s`};
const KGLB=0.45359237;
const disp=kg=>S.settings.unit==="kg"?kg:kg/KGLB;
const store=v=>S.settings.unit==="kg"?v:v*KGLB;
const fmtW=(kg,d=1)=>{const v=Number(disp(kg).toFixed(d));return `${v%1===0?v.toFixed(0):v} ${S.settings.unit}`};
const wstep=()=>S.settings.unit==="kg"?2.5:5;
const monIdx=d=>(d.getDay()+6)%7;
const WD=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const dayKey=t=>new Date(t).setHours(0,0,0,0);

/* icons (inline SVG, original) */
const I={
home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
dumb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/></svg>',
chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 14 4-4 3 3 5-6"/></svg>',
cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="5" width="16" height="16" rx="3"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>',
gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1 7 17M17 7l2.1-2.1"/></svg>',
};

/* ── seed exercises (original instruction text) ──────────────────────── */
const MUSCLES={chest:"Chest",back:"Back",shoulders:"Shoulders",biceps:"Biceps",triceps:"Triceps",forearms:"Forearms",quads:"Quads",hamstrings:"Hamstrings",glutes:"Glutes",calves:"Calves",abs:"Abs","full-body":"Full Body",cardio:"Cardio"};
const EQUIP={barbell:"Barbell",dumbbell:"Dumbbell",machine:"Machine",cable:"Cable",bodyweight:"Bodyweight",kettlebell:"Kettlebell",band:"Band",other:"Other"};
/* body-part sections shown as headers in the library & picker (grouped by an
   exercise's FIRST listed muscle) */
const GROUP_OF={chest:"Chest",back:"Back",shoulders:"Shoulders",biceps:"Arms",triceps:"Arms",forearms:"Arms",
  quads:"Legs",hamstrings:"Legs",glutes:"Legs",calves:"Legs",abs:"Core",cardio:"Cardio","full-body":"Other"};
const GROUP_ORDER=["Chest","Back","Shoulders","Arms","Legs","Core","Cardio","Other"];
/* default muscle used when creating a custom exercise from a group header */
const GROUP_ADD={Chest:"chest",Back:"back",Shoulders:"shoulders",Arms:"biceps",Legs:"quads",Core:"abs",Cardio:"cardio",Other:"full-body"};
/* Render a list of exercises split into labelled sections. `row` renders one
   item; `withAdd` shows a "＋ Add" button per header for custom exercises. */
function groupedHTML(list,row,withAdd){
  const buckets={};
  for(const e of list){const g=GROUP_OF[e.muscles[0]]||"Other";(buckets[g]=buckets[g]||[]).push(e);}
  return GROUP_ORDER.filter(g=>buckets[g]).map(g=>{
    const items=buckets[g].sort((a,b)=>(b.fav-a.fav)||a.name.localeCompare(b.name));
    return `<div class="row" style="margin:14px 4px 8px">
      <p class="sec grow" style="margin:0">${g.toUpperCase()} <span style="color:var(--fg3);font-weight:500">· ${items.length}</span></p>
      ${withAdd?`<button style="font-size:12px;font-weight:700;color:var(--accent)" onclick="editEx(null,'${GROUP_ADD[g]}')" aria-label="Add custom ${g} exercise">＋ Add</button>`:""}
    </div>`+items.map(row).join("");
  }).join("")||"";
}
const ex=(id,name,m,eq,ins,cat)=>({id:"b-"+id,name,category:cat||"strength",muscles:m,equipment:eq,instructions:ins,videoUrl:"",custom:false,fav:false});
const SEED=[
ex("bench","Bench Press",["chest","triceps","shoulders"],"barbell",["Lie on the bench with feet planted and shoulder blades pulled together.","Grip the bar slightly wider than shoulder width and unrack it over your chest.","Lower the bar under control to your mid-chest, elbows around 45°.","Press back up to full lockout without bouncing off the chest."]),
ex("incdb","Incline Dumbbell Press",["chest","shoulders","triceps"],"dumbbell",["Set the bench to a 30–45° incline with a dumbbell in each hand.","Start at shoulder level, palms forward.","Press up and slightly inward to extension.","Lower slowly until you feel a stretch across the upper chest."]),
ex("fly","Dumbbell Fly",["chest"],"dumbbell",["Lie flat holding dumbbells above your chest, slight elbow bend.","Open your arms in a wide arc until you feel a chest stretch.","Keep the elbow angle fixed and squeeze back together."]),
ex("pushup","Push-Up",["chest","triceps","shoulders","abs"],"bodyweight",["Start in a high plank, hands under shoulders, body straight.","Lower your chest to just above the floor, elbows ~45°.","Push back up keeping your core tight."]),
ex("cross","Cable Crossover",["chest"],"cable",["Set both pulleys high, stand centered with a slight lean.","Pull the handles down and together in front of your hips.","Control the return until your chest is fully stretched."]),
ex("dip","Chest Dip",["chest","triceps"],"bodyweight",["Support yourself on parallel bars, torso leaning slightly forward.","Lower until shoulders are just below the elbows.","Press back up without harsh lockout."]),
ex("pullup","Pull-Up",["back","biceps"],"bodyweight",["Hang with an overhand grip slightly wider than shoulders.","Pull your chest toward the bar, driving elbows down.","Lower under full control to a dead hang."]),
ex("bbrow","Bent Over Barbell Row",["back","biceps"],"barbell",["Hinge to ~45° with a flat back, bar at arm's length.","Row the bar to your lower ribs, elbows close.","Lower slowly without your torso rising."]),
ex("latpd","Lat Pulldown",["back","biceps"],"machine",["Sit with thighs secured, grip the bar wide.","Pull the bar to your upper chest, torso tall.","Resist the weight up to a full stretch."]),
ex("cablerow","Seated Cable Row",["back","biceps"],"cable",["Sit tall, knees slightly bent, handle at arm's length.","Pull to your stomach, squeezing shoulder blades.","Extend fully between reps without rounding."]),
ex("dead","Deadlift",["back","hamstrings","glutes","full-body"],"barbell",["Stand with mid-foot under the bar; hinge and grip outside your legs.","Brace, flatten your back, push the floor away to stand tall.","Lock out with glutes, then hinge the bar down under control."]),
ex("dbrow","Single-Arm Dumbbell Row",["back","biceps"],"dumbbell",["Support one hand and knee on a bench, back flat.","Row the dumbbell to your hip, elbow close.","Lower to a full stretch without rotating."]),
ex("ohp","Overhead Press Barbell",["shoulders","triceps"],"barbell",["Bar at collarbone height, grip just outside shoulders.","Brace and press straight overhead.","Push your head slightly through at lockout, lower to start."]),
ex("latraise","Lateral Raises Dumbbell",["shoulders"],"dumbbell",["Hold dumbbells at your sides, soft elbow bend.","Raise your arms to shoulder height, leading with elbows.","Lower slowly — no swinging."]),
ex("facepull","Face Pull",["shoulders","back"],"cable",["Rope at upper-chest height, thumbs toward you.","Pull toward your face, spreading the rope apart.","Pause with upper arms in line with shoulders."]),
ex("dbpress","Dumbbell Shoulder Press",["shoulders","triceps"],"dumbbell",["Sit upright, dumbbells at shoulder height, palms forward.","Press overhead to extension without clanking.","Lower under control to ear level."]),
ex("reardelt","Rear Delt Fly",["shoulders","back"],"dumbbell",["Hinge forward, flat back, dumbbells below your chest.","Raise your arms out wide, squeezing rear shoulders.","Lower slowly without shrugging."]),
ex("bbcurl","Barbell Curl",["biceps","forearms"],"barbell",["Underhand shoulder-width grip.","Curl to shoulder height, elbows pinned to your sides.","Lower fully with control."]),
ex("dbcurl","Dumbbell Curl",["biceps","forearms"],"dumbbell",["Dumbbells at your sides, palms forward.","Curl up without swinging your torso.","Lower to full extension."]),
ex("hammer","Hammer Curl",["biceps","forearms"],"dumbbell",["Neutral (thumbs-up) grip.","Curl to shoulder height keeping the grip neutral.","Lower slowly to extension."]),
ex("pushdown","Triceps Pushdown",["triceps"],"cable",["Grip the attachment, elbows at your sides.","Extend fully downward, squeezing the triceps.","Let the handle rise until forearms pass parallel."]),
ex("skull","Skull Crusher",["triceps"],"barbell",["Lie on a bench, bar over your chest.","Bend only at the elbows toward your forehead.","Extend back keeping upper arms vertical."]),

/* ── state ───────────────────────────────────────────────────────────── */
const KEY="fit-tracker-v1";
const DEFAULT={settings:{unit:"kg",theme:"system",rest:120,autoRest:true},
  exercises:SEED,templates:[],plans:[],workouts:[],prs:[],bodyLogs:[],session:null};
let S;
try{S=Object.assign({},DEFAULT,JSON.parse(localStorage.getItem(KEY)||"{}"));}catch(e){S=structuredClone(DEFAULT);}
if(!S.exercises||!S.exercises.length)S.exercises=SEED;
else{ /* merge any newly added built-ins into existing saves */
  const have=new Set(S.exercises.map(e=>e.id));
  SEED.forEach(e=>{if(!have.has(e.id))S.exercises.push(e);});
}
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
const E=id=>S.exercises.find(e=>e.id===id);
/* transient UI state (not persisted) */
const UI={tab:"home",sheet:null,q:"",filter:"all",hq:"",month:new Date(new Date().getFullYear(),new Date().getMonth(),1),
  selDay:null,range:"6m",metric:"weight",progEx:null,picker:new Set(),draft:null,summary:null,notesOpen:new Set()};

/* theme */
function applyTheme(){
  const t=S.settings.theme;
  const dark=t==="dark"||(t==="system"&&matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.classList.toggle("dark",dark);
}
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);

/* ── stats ───────────────────────────────────────────────────────────── */
const e1rm=(w,r)=>!w||!r?0:r===1?w:w*(1+r/30);
const setVol=s=>s.type==="warmup"?0:(s.weight||0)*(s.reps||0);
const wVol=w=>w.exercises.reduce((a,e)=>a+e.sets.reduce((v,s)=>v+(s.done?setVol(s):0),0),0);
const wSets=w=>w.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
function bestIn(w,exId,type){let b=0;
  for(const e of w.exercises){if(e.exerciseId!==exId)continue;
    for(const s of e.sets){if(!s.done||s.type==="warmup")continue;
      const v=type==="weight"?(s.weight||0):type==="reps"?(s.reps||0):type==="volume"?setVol(s):e1rm(s.weight,s.reps);
      if(v>b)b=v;}}
  return b;}
function streak(dates){if(!dates.length)return 0;
  const d=[...new Set(dates.map(dayKey))].sort((a,b)=>b-a);const DAY=864e5;
  if(dayKey(Date.now())-d[0]>2*DAY)return 0;
  let n=1;for(let i=1;i<d.length;i++){if(d[i-1]-d[i]<=2*DAY)n++;else break;}return n;}
function avgGap(dates){const d=[...new Set(dates.map(dayKey))].sort((a,b)=>a-b);
  return d.length<2?null:(d[d.length-1]-d[0])/864e5/(d.length-1);}

/* random pick that never repeats the previous one (per key) */
function pick(arr,key){
  const last=+(localStorage.getItem(key)??-1);let i;
  do{i=Math.floor(Math.random()*arr.length);}while(arr.length>1&&i===last);
  localStorage.setItem(key,i);return arr[i];
}

let toastTimer,toastUndo=null;
function toast(msg,undo){
  clearTimeout(toastTimer);toastUndo=undo||null;
  $("#toast").innerHTML=`<div class="in"><span>${esc(msg)}</span>${undo?'<button class="act" onclick="doUndo()">Undo</button>':""}</div>`;
  toastTimer=setTimeout(()=>{$("#toast").innerHTML="";toastUndo=null;},5000);
}
function doUndo(){if(toastUndo)toastUndo();$("#toast").innerHTML="";toastUndo=null;render();}

  const d=wk.days[monIdx(new Date())];

/* ── SESSION ─────────────────────────────────────────────────────────── */
const newSet=(type="working")=>({id:uid(),type,weight:null,reps:null,mins:null,km:null,rpe:null,done:false});
function beginSession(workout){S.session={workout,startedAt:Date.now(),rest:null};save();go("session");}
function startEmpty(){beginSession({id:uid(),name:"Workout",templateId:null,date:Date.now(),durationSec:0,exercises:[]});}
function startTpl(id){const t=S.templates.find(x=>x.id===id);if(!t)return;
  beginSession({id:uid(),name:t.name,templateId:t.id,date:Date.now(),durationSec:0,
    exercises:t.items.map(i=>({id:uid(),exerciseId:i.exerciseId,notes:"",restSec:i.restSec||S.settings.rest,
      sets:Array.from({length:Math.max(1,i.sets)},newSet)}))});}
function startFromWorkout(id){const w=S.workouts.find(x=>x.id===id);if(!w||S.session)return;
  beginSession({id:uid(),name:w.name,templateId:w.templateId,date:Date.now(),durationSec:0,
    exercises:w.exercises.map(e=>({...e,id:uid(),sets:e.sets.map(s=>({...s,id:uid(),done:false}))}))});}

function prevPerf(exId){
  for(const w of [...S.workouts].sort((a,b)=>b.date-a.date)){
    const m=w.exercises.find(e=>e.exerciseId===exId);
    if(m){const sets=m.sets.filter(s=>s.done);if(sets.length)return sets;}
  }return null;}

/* ── progressive overload (double progression, 8–12 rep range) ────────
   If every working set last time hit 12+ reps → add one weight increment
   and reset to 8 reps. Otherwise → same weight, add one rep to the worst
   set. Bodyweight movements just add a rep. */
function suggestNext(exId){
  const info=E(exId);if(!info||info.category==="cardio")return null;
  const prev=prevPerf(exId);if(!prev)return null;
  const working=prev.filter(s=>s.type!=="warmup"&&(s.reps||0)>0);
  if(!working.length)return null;
  const minReps=Math.min(...working.map(s=>s.reps||0));
  const topW=Math.max(...working.map(s=>s.weight||0));
  if(!topW)return {weight:null,reps:minReps+1,sets:working.length,mode:"rep"};
  if(minReps>=12)return {weight:topW+store(wstep()),reps:8,sets:working.length,mode:"weight"};
  return {weight:topW,reps:minReps+1,sets:working.length,mode:"rep"};
}
function applyTarget(ei){
  const e=S.session.workout.exercises[ei];
  const sug=suggestNext(e.exerciseId);if(!sug)return;
  e.sets=Array.from({length:sug.sets},()=>({...newSet(),weight:sug.weight,reps:sug.reps}));
  save();render();
}

    <div class="row" style="height:56px">
      <button style="color:var(--accent);font-weight:500;font-size:15px" onclick="go('home')">‹ Home</button>
      <div class="grow" style="text-align:center"><b style="font-size:15px" class="trunc">${esc(w.name)}</b>
        <p class="muted" style="font-size:12px"><span id="elapsed">--:--</span> · ${done}/${total} sets</p></div>
      <button class="btn green sm" onclick="finishSession()" ${done===0?"disabled":""}>⚑ Finish</button>
    </div></div>
  <div style="padding-top:14px">
  ${w.exercises.length===0?`<div class="empty"><div class="ico">🏋️</div><p class="t">Empty workout</p><p class="s">Add your first exercise to start logging sets.</p></div>`:""}

  <div class="row" style="margin-top:12px">
    <button class="btn soft grow" onclick="openPicker('session')">＋ Add Exercise</button>

function exerciseCard(e,ei){
  const info=E(e.exerciseId),cardio=info&&info.category==="cardio";
  const prev=prevPerf(e.exerciseId);
  const prevTxt=prev?prev.slice(0,3).map(s=>cardio?`${Math.round(s.mins||0)}min`:`${fmtW(s.weight||0)} × ${s.reps||0}`).join(", "):null;
  const notesOpen=UI.notesOpen.has(e.id)||e.notes;
  return `<div class="card" style="margin-bottom:12px">
    <div class="row" style="align-items:flex-start;margin-bottom:4px">
      <button class="grow" style="text-align:left" onclick="openSheet({type:'exdetail',id:'${e.exerciseId}'})">
        <b style="color:var(--accent);font-size:17px">${esc(info?info.name:"Unknown")}</b></button>
      <button class="icobtn" onclick="toggleNotes('${e.id}')" aria-label="Notes">📝</button>
      <button class="icobtn" onclick="removeEx(${ei})" aria-label="Remove exercise">🗑</button>
    </div>
    ${prevTxt?`<button class="muted" style="display:block;margin-bottom:6px;text-align:left" onclick="applyPrev(${ei})">🕐 Last: ${esc(prevTxt)}${prev.length>3?"…":""} <b style="color:var(--accent)">Apply</b></button>`:""}
    ${(()=>{const sug=suggestNext(e.exerciseId);if(!sug||cardio)return "";
      const t=sug.weight?`${fmtW(sug.weight)} × ${sug.reps}`:`${sug.reps} reps`;
      return `<button class="muted" style="display:block;margin-bottom:8px;text-align:left" onclick="applyTarget(${ei})">⬆ Next target: <b style="color:var(--fg)">${t}</b> <span style="font-size:11px;font-weight:700;color:${sug.mode==="weight"?"var(--success)":"var(--warning)"};background:${sug.mode==="weight"?"var(--success-soft)":"rgba(255,159,10,.15)"};border-radius:99px;padding:2px 8px">${sug.mode==="weight"?"ADD WEIGHT":"ADD A REP"}</span> <b style="color:var(--accent)">Apply</b></button>`;})()}
    ${notesOpen?`<textarea class="input" style="height:60px;padding:10px 14px;resize:none;margin-bottom:8px" placeholder="Notes for this exercise…" oninput="S.session.workout.exercises[${ei}].notes=this.value;save()">${esc(e.notes)}</textarea>`:""}
    <div class="cols"><span style="width:28px">Set</span><span style="flex:1">${cardio?"Minutes":"Weight ("+S.settings.unit+")"}</span><span style="flex:1">${cardio?"Km":"Reps"}</span><span style="width:36px">RPE</span><span style="width:28px">✓</span></div>
    ${e.sets.map((s,si)=>setRow(s,si,ei,cardio)).join("")}
    <button class="btn plain sm" style="width:100%;height:36px;border-radius:12px;margin-top:4px" onclick="addSet(${ei})">＋ Add Set</button>
  </div>`;
}
function setRow(s,si,ei,cardio){
  const badge=s.type==="warmup"?'<span class="badge w">W</span>':s.type==="drop"?'<span class="badge d">D</span>':`<span class="badge">${si+1}</span>`;
  const f1=cardio?["mins",5,0]:["weight",wstep(),1], f2=cardio?["km",0.5,2]:["reps",1,0];
  const val=(field)=>{const v=s[field];if(v==null)return "";return field==="weight"?Number(disp(v).toFixed(1)):v;};
  return `<div class="setrow ${s.done?"done":""}">
    <button onclick="cycleType(${ei},${si})" aria-label="Set type">${badge}</button>
    <div class="stpr">
      <button class="icobtn" onclick="bump(${ei},${si},'${f1[0]}',-${f1[1]})">−</button>
      <input class="num" type="number" inputmode="decimal" placeholder="—" value="${val(f1[0])}"
        oninput="setField(${ei},${si},'${f1[0]}',this.value)" aria-label="${f1[0]}">
      <button class="icobtn" onclick="bump(${ei},${si},'${f1[0]}',${f1[1]})">＋</button>
    </div>
    <div class="stpr">
      <button class="icobtn" onclick="bump(${ei},${si},'${f2[0]}',-${f2[1]})">−</button>
      <input class="num" type="number" inputmode="decimal" placeholder="—" value="${val(f2[0])}"
        oninput="setField(${ei},${si},'${f2[0]}',this.value)" aria-label="${f2[0]}">
      <button class="icobtn" onclick="bump(${ei},${si},'${f2[0]}',${f2[1]})">＋</button>
    </div>
    <input class="num" style="width:36px;font-size:12px" type="number" inputmode="decimal" placeholder="RPE" value="${s.rpe??""}"
      oninput="setField(${ei},${si},'rpe',this.value)" aria-label="RPE">
    <button class="check ${s.done?"on":""}" onclick="toggleDone(${ei},${si})" aria-label="Complete set">✓</button>
    <button class="icobtn" style="width:24px;height:24px;font-size:11px" onclick="delSet(${ei},${si})" aria-label="Delete set">✕</button>
  </div>`;
}
function toggleNotes(id){UI.notesOpen.has(id)?UI.notesOpen.delete(id):UI.notesOpen.add(id);render();}
function setField(ei,si,f,raw){
  const s=S.session.workout.exercises[ei].sets[si];
  const v=parseFloat(raw);
  if(raw.trim()===""||isNaN(v)){s[f]=null;}
  else if(f==="weight"){s[f]=store(v);}
  else if(f==="rpe"){s[f]=Math.min(10,Math.max(1,v));}
  else{s[f]=Math.max(0,v);}
  save();/* no render — keep typing focus */
}
function bump(ei,si,f,d){
  const s=S.session.workout.exercises[ei].sets[si];
  if(f==="weight"){const cur=s.weight==null?0:disp(s.weight);s.weight=store(Math.max(0,Number((cur+d).toFixed(2))));}
  else{s[f]=Math.max(0,Number((((s[f])||0)+d).toFixed(2)));}
  save();render();
}
function cycleType(ei,si){const s=S.session.workout.exercises[ei].sets[si];
  s.type=s.type==="working"?"warmup":s.type==="warmup"?"drop":"working";save();render();}
function toggleDone(ei,si){
  const e=S.session.workout.exercises[ei],s=e.sets[si];
  s.done=!s.done;
  if(s.done&&S.settings.autoRest)startRest(e.restSec||S.settings.rest);
  save();render();
}
function addSet(ei){const sets=S.session.workout.exercises[ei].sets;const last=sets[sets.length-1];
  sets.push(last?{...last,id:uid(),done:false}:newSet());save();render();}
function delSet(ei,si){S.session.workout.exercises[ei].sets.splice(si,1);save();render();}
function removeEx(ei){S.session.workout.exercises.splice(ei,1);save();render();}
function applyPrev(ei){const e=S.session.workout.exercises[ei];const prev=prevPerf(e.exerciseId);if(!prev)return;
  e.sets=prev.map(s=>({...s,id:uid(),done:false}));save();render();}

/* rest timer */
function startRest(total){S.session.rest={endsAt:Date.now()+total*1000,total};save();renderRest();}
function adjRest(d){const r=S.session&&S.session.rest;if(!r)return;
  r.endsAt=Math.max(Date.now(),r.endsAt+d*1000);r.total=Math.max(1,r.total+d);save();renderRest();}
function stopRest(){if(S.session){S.session.rest=null;save();}renderRest();}
function renderRest(){
  const el=$("#restbar"),r=S.session&&S.session.rest;
  if(!r||UI.tab!=="session"){el.style.display="none";el.innerHTML="";return;}
  const rem=Math.max(0,Math.ceil((r.endsAt-Date.now())/1000));
  el.style.display="flex";
  el.innerHTML=`<div class="in"><span class="tiny">Rest</span>
    <button class="icobtn" onclick="adjRest(-10)" aria-label="−10s">−</button>
    <span class="t" style="${rem===0?"color:var(--success)":""}">${rem===0?"Go!":clock(rem)}</span>
    <button class="icobtn" onclick="adjRest(10)" aria-label="+10s">＋</button>
    <button class="icobtn" onclick="stopRest()" aria-label="Skip">✕</button>
    <div class="bar" style="width:${(rem/r.total)*100}%"></div></div>`;
  if(rem===0)setTimeout(()=>{if(S.session&&S.session.rest&&Date.now()>=S.session.rest.endsAt)stopRest();},1500);
}

/* finish */
function finishSession(){
  const s=S.session;
  const workout={...s.workout,durationSec:Math.round((Date.now()-s.startedAt)/1000),
    exercises:s.workout.exercises.map(e=>({...e,sets:e.sets.filter(x=>x.done)})).filter(e=>e.sets.length)};
  const newPRs=[];
  const types=["weight","reps","volume","e1rm"];
  for(const exId of [...new Set(workout.exercises.map(e=>e.exerciseId))]){
    for(const type of types){
      const v=bestIn(workout,exId,type);if(v<=0)continue;
      const old=S.prs.find(p=>p.exerciseId===exId&&p.type===type);
      if(!old||v>old.value){
        if(old){newPRs.push({exerciseId:exId,type,value:v,prev:old.value});old.value=v;old.date=workout.date;old.workoutId=workout.id;}
        else{newPRs.push({exerciseId:exId,type,value:v,prev:null});S.prs.push({id:uid(),exerciseId:exId,type,value:v,date:workout.date,workoutId:workout.id});}
      }}}
  S.workouts.push(workout);S.session=null;save();
  UI.summary={workout,newPRs};render();
}

function progress(){

  </div>`;

function svgChart(pts){
  const W=560,H=190,PL=38,PR=10,PT=12,PB=24;
  const xs=pts.map(p=>p.date),ys=pts.map(p=>p.value);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  const yr=(y1-y0)||1,xr=(x1-x0)||1;
  const X=t=>PL+(t-x0)/xr*(W-PL-PR),Y=v=>H-PB-(v-y0+yr*.08)/(yr*1.16)*(H-PT-PB);
  const path=pts.map((p,i)=>`${i?"L":"M"}${X(p.date).toFixed(1)},${Y(p.value).toFixed(1)}`).join(" ");
  const gridY=[y0,(y0+y1)/2,y1];
  const fmtD=t=>new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" aria-hidden="true">
    ${gridY.map(v=>`<line x1="${PL}" x2="${W-PR}" y1="${Y(v)}" y2="${Y(v)}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${PL-6}" y="${Y(v)+4}" text-anchor="end" font-size="10" fill="var(--fg3)">${Number(v.toFixed(1))}</text>`).join("")}
    <text x="${PL}" y="${H-6}" font-size="10" fill="var(--fg3)">${fmtD(x0)}</text>
    <text x="${W-PR}" y="${H-6}" text-anchor="end" font-size="10" fill="var(--fg3)">${fmtD(x1)}</text>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${X(p.date).toFixed(1)}" cy="${Y(p.value).toFixed(1)}" r="3" fill="var(--accent)"/>`).join("")}
  </svg>`;
}

      <button class="sw ${st.autoRest?"on":""}" role="switch" aria-checked="${st.autoRest}" onclick="S.settings.autoRest=!S.settings.autoRest;save();render()"><i></i></button></div>

    <div class="setline"><span><b style="font-size:15px">Import backup</b><p class="muted" style="font-size:12px">Replaces current data</p></span>
      <button class="btn soft sm" onclick="$('#importfile').click()">⬆ Import</button></div>
  </div>

  <div class="card" style="padding:0">

function exportJSON(){
  const blob=new Blob([JSON.stringify({app:"fit-tracker",version:1,exportedAt:new Date().toISOString(),data:S},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`fit-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(a.href);toast("Backup downloaded");
}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  f.text().then(txt=>{
    const parsed=JSON.parse(txt);
    const data=parsed.app==="fit-tracker"?parsed.data:parsed;
    if(!data||!Array.isArray(data.workouts))throw new Error("bad");
    S=Object.assign({},structuredClone(DEFAULT),data);save();render();toast("Backup restored");
  }).catch(()=>toast("Not a valid Fit Tracker backup file.")).finally(()=>input.value="");
}

/* ── SHEETS ──────────────────────────────────────────────────────────── */

function closeSheet(){UI.sheet=null;UI.picker=new Set();renderSheet();}

  const body={exdetail:shExDetail,exform:shExForm,picker:shPicker,tpl:shTpl,plan:shPlan,planday:shPlanDay,

    <div class="sheet" role="dialog" aria-modal="true">
      <div class="hd"><span style="width:32px"></span><h2>${body.title}</h2>
        <button class="icobtn" onclick="closeSheet()" aria-label="Close">✕</button></div>

function toggleDraftMuscle(m){const a=UI.draft.muscles;

  if(S.session){
    const t=Math.floor((Date.now()-S.session.startedAt)/1000);
    const a=$("#elapsed");if(a)a.textContent=clock(t);
    const b=$("#elapsed-home");if(b)b.textContent=clock(t)+" elapsed — tap to resume";
    if(S.session.rest)renderRest();
  }
},1000);

/* keyboard shortcuts */
addEventListener("keydown",e=>{
  if(e.target.matches("input,textarea,select")||e.metaKey||e.ctrlKey)return;
  const map={"1":"home","2":"train","3":"progress","4":"history","5":"settings"};
  if(map[e.key])go(map[e.key]);
  if(e.key==="Escape"&&UI.sheet)closeSheet();
});

/* ── boot ── */
applyTheme();
pickedHomeLine=pick(HOME_LINES,"ft-lasthome");
showSplash();
render();
if(!S.settings.name&&!localStorage.getItem("ft-nameasked"))askName();
</script>
</body>
</html>
